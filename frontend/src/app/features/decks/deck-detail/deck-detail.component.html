<div class="page-container" *ngIf="!isLoading && deck">
  
  <!-- Header matching SeaVoca -->
  <div class="deck-header">
    <div class="deck-title-area">
      <button class="back-btn" routerLink="/decks">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
      <h1>Từ vựng {{ deck.name }}</h1>
    </div>
    
    <div class="header-actions">
      <button class="icon-btn" title="Làm mới" (click)="loadWords()">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
      </button>
      <button class="icon-btn" title="Chia sẻ">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
      </button>
      <button class="icon-btn" title="Tải xuống">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
      </button>
      <button class="icon-btn" title="Trợ giúp">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
      </button>
    </div>
  </div>

  <!-- Study Modes Section -->
  <div class="study-modes-section">
    <a [routerLink]="['/study/listening']" [queryParams]="{deck: deck.id}" class="mode-card blue-card">
      <div class="mode-icon">🎧</div>
      <h3>Luyện nghe</h3>
      <p>Cải thiện phản xạ</p>
    </a>
    <a [routerLink]="['/study/speaking']" [queryParams]="{deck: deck.id}" class="mode-card purple-card">
      <div class="mode-icon">🎤</div>
      <h3>Luyện nói</h3>
      <p>Hoàn thiện phát âm</p>
    </a>
  </div>

  <!-- Action Bar -->
  <div class="action-bar">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" placeholder="Tìm kiếm..." [value]="searchQuery" (input)="onSearch($event)">
      <button class="filter-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
      </button>
    </div>
    
    <div class="action-buttons">
      <button class="btn btn-outline disabled" title="Thư mục con chưa được hỗ trợ">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line></svg>
        Tạo thư mục
      </button>
      <button class="btn btn-primary" (click)="openCreateModal()">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
        Tạo Flashcard
      </button>
    </div>
  </div>

  <!-- Content List -->
  <div class="content-list">
    <div class="empty-state" *ngIf="words.length === 0">
      <div class="empty-icon">📭</div>
      <p>Chưa có từ vựng nào.</p>
    </div>

    <div class="list-item" *ngFor="let word of words">
      <div class="item-icon-area">
        <div class="shield-icon">🛡️</div>
        <!-- SeaVoca uses shield icons with numbers for word level/status -->
      </div>
      
      <div class="item-content">
        <div class="item-title">{{ word.term }}</div>
        <div class="item-subtitle">
          <span *ngIf="word.ipa">{{ word.ipa }} • </span>
          <span>{{ word.definition_vi }}</span>
        </div>
      </div>
      
      <div class="item-actions">
        <button class="icon-btn" (click)="deleteWord(word.id)">
          <!-- Using trash icon for delete, SeaVoca has a 3-dot menu -->
          <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </button>
      </div>
    </div>
  </div>

</div>

<!-- Loading state -->
<div class="loading-state" *ngIf="isLoading">
  <div class="spinner"></div>
</div>

<!-- Modal -->
<app-create-flashcard-modal 
  *ngIf="showCreateModal" 
  [deckId]="deckId" 
  (closeModal)="closeCreateModal($event)">
</app-create-flashcard-modal>
