<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Welcome Back 👋</h2>
      <p>Log in to continue your English learning journey.</p>
    </div>
    
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          [(ngModel)]="username" 
          required 
          placeholder="Enter your username">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          required 
          placeholder="Enter your password">
      </div>
      
      <div class="error-message" *ngIf="errorMsg">
        {{ errorMsg }}
      </div>
      
      <button type="submit" class="btn btn-primary btn-full" [disabled]="!loginForm.form.valid || isLoading">
        <span *ngIf="!isLoading">Log In</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
      
      <div class="auth-footer">
        <p>Don't have an account? <a routerLink="/register">Sign up</a></p>
      </div>
    </form>
  </div>
</div>
