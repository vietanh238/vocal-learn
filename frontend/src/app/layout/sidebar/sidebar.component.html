<aside class="sidebar">

  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">🧠</div>
    <div class="logo-text">
      <span class="logo-name">VocaLearn</span>
      <span class="logo-tagline">Science-based</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="nav-menu">
    <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Dashboard</span>
    </a>
    <a routerLink="/decks" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">📚</span>
      <span class="nav-label">My Decks</span>
    </a>
    <a routerLink="/study/today" routerLinkActive="active" class="nav-item highlight">
      <span class="nav-icon">🔥</span>
      <span class="nav-label">Study Now</span>
    </a>
    <a routerLink="/ai-cards" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">🤖</span>
      <span class="nav-label">AI Generator</span>
    </a>
    <a routerLink="/settings" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Settings</span>
    </a>
  </nav>

  <!-- Pomodoro widget -->
  <div class="sidebar-widgets">
    <app-pomodoro></app-pomodoro>
  </div>

  <!-- Gamification footer -->
  <div class="sidebar-footer" *ngIf="stats; else loadingFooter">
    <div class="level-row">
      <div class="level-badge">
        <span class="level-num">{{ stats.level }}</span>
        <span class="level-lbl">LVL</span>
      </div>
      <div class="level-details">
        <div class="level-bar-wrap">
          <div class="level-bar-track">
            <div class="level-bar-fill" [style.width.%]="xpPercentage"></div>
          </div>
        </div>
        <span class="xp-text">{{ currentXpInLevel }} / 1000 XP</span>
      </div>
    </div>

    <div class="streak-row" *ngIf="stats.current_streak > 0">
      <div class="streak-fire">🔥</div>
      <div class="streak-info">
        <span class="streak-count">{{ stats.current_streak }}</span>
        <span class="streak-label">ngày liên tục</span>
      </div>
    </div>
    <div class="streak-row empty-streak" *ngIf="stats.current_streak === 0">
      <span class="streak-fire">🌱</span>
      <span class="streak-label">Bắt đầu streak hôm nay!</span>
    </div>
  </div>

  <ng-template #loadingFooter>
    <div class="footer-skeleton"></div>
  </ng-template>

</aside>
