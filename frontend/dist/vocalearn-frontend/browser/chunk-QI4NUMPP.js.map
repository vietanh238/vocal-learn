<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Create Account 🌟</h2>
      <p>Start mastering vocabulary today.</p>
    </div>
    
    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          [(ngModel)]="username" 
          required 
          placeholder="Choose a username">
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          required 
          placeholder="Enter your email">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          required 
          placeholder="Create a password">
      </div>
      
      <div class="error-message" *ngIf="errorMsg">
        {{ errorMsg }}
      </div>
      
      <button type="submit" class="btn btn-primary btn-full" [disabled]="!registerForm.form.valid || isLoading">
        <span *ngIf="!isLoading">Sign Up</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
      
      <div class="auth-footer">
        <p>Already have an account? <a routerLink="/login">Log in</a></p>
      </div>
    </form>
  </div>
</div>
