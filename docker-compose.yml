version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vocalearn-postgres
    restart: always
    environment:
      POSTGRES_USER: vocalearn_user
      POSTGRES_PASSWORD: vocalearn_password
      POSTGRES_DB: vocalearn_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: vocalearn-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@vocalearn.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
